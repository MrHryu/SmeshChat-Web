                    <button id="changePass">Сменить пароль</button>
                </div>;
            document.getElementById('changePass').onclick = () => {
                const newPass = prompt('Новый пароль:');
                if (newPass) { user.password = newPass; saveState(); alert('Пароль изменён'); }
            };
        }

        // Старт
        if (appState.currentUser && appState.users[appState.currentUser]) {
            setActivePage('wall');
        } else {
            renderLogin();
            pageTitle.innerText = 'Стена';
        }
    })();
</script>
</body>
</html>
